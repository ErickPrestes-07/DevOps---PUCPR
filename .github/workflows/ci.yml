name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: 🔨 Build & Testes
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🧹 Executar linter
        run: npm run lint

      - name: 🧪 Executar testes
        run: npm test

      - name: 🏗️ Build do projeto
        run: npm run build


      - name: 📤 Upload do build como artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: 🚀 Deploy (simulado)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: ✅ Simulação de Deploy
        run: echo "✅ Deploy realizado com sucesso na branch ${GITHUB_REF##refs/heads/}!"

  docker:
    name: 🐳 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-pucpr:latest

      - name: 📢 Notificação Discord
        if: always()
        uses: appleboy/discord-action@master
        with:
          webhook_id: ${{ secrets.DISCORD_ID }}
          webhook_token: ${{ secrets.DISCORD_TOKEN }}
          message: "🚀 Workflow **${{ github.workflow }}** finalizado!\n**Status:** ${{ job.status }}\n**Branch:** ${{ github.ref_name }}\n**Evento:** ${{ github.event_name }}\n**Commit:** ${{ github.event.head_commit.message }}"

