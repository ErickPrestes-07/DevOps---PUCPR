name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: 🔨 Build & Testes
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🧹 Executar linter
        run: npm run lint

      - name: 🧪 Executar testes
        run: npm test

      - name: 🏗️ Build do projeto
        run: npm run build
