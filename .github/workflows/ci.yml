name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: 🔨 Build & Testes
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🧪 Executar testes
        run: npm test

      - name: 🏗️ Build do projeto
        run: npm run build

      - name: 📤 Upload do build como artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: 🚀 Deploy (simulado)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: ✅ Simulação de Deploy
        run: echo "✅ Deploy realizado com sucesso na branch main!"
